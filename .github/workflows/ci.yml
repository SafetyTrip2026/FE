name: CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - "Dockerfile"
      - "nginx.conf"
      - ".github/workflows/**"
      - "!**/*.md"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - "Dockerfile"
      - "nginx.conf"
      - ".github/workflows/**"
      - "!**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and build app
        run: npm run ci

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: safetytrip-fe-dist
          path: dist
          if-no-files-found: error

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t safetytrip-fe:ci .

  comment:
    name: PR Report
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs:
      - build
      - docker
    permissions:
      pull-requests: write
    steps:
      - name: Post CI result comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_RESULT: ${{ needs.build.result }}
          DOCKER_RESULT: ${{ needs.docker.result }}
        run: |
          if [ "$BUILD_RESULT" = "success" ]; then BUILD_ICON="PASS"; else BUILD_ICON="FAIL"; fi
          if [ "$DOCKER_RESULT" = "success" ]; then DOCKER_ICON="PASS"; else DOCKER_ICON="FAIL"; fi

          {
            echo "### SafetyTrip FE CI Report"
            echo ""
            echo "| Category | Status |"
            echo "|---|---|"
            echo "| Build | $BUILD_ICON $BUILD_RESULT |"
            echo "| Docker | $DOCKER_ICON $DOCKER_RESULT |"
            echo ""
            if [ "$BUILD_RESULT" = "success" ] && [ "$DOCKER_RESULT" = "success" ]; then
              echo "All FE checks passed."
            else
              echo "One or more FE checks failed. Please check the workflow logs."
            fi
          } > status_report.md

          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file status_report.md

          if [ "$BUILD_RESULT" != "success" ] || [ "$DOCKER_RESULT" != "success" ]; then
            exit 1
          fi
